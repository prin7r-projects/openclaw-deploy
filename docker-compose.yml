services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    container_name: openclaw-deploy-landing
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw-deploy.rule=Host(`openclaw-deploy.prin7r.com`)"
      - "traefik.http.routers.openclaw-deploy.entrypoints=websecure"
      - "traefik.http.routers.openclaw-deploy.tls=true"
      - "traefik.http.routers.openclaw-deploy.tls.certresolver=letsencrypt"
      - "traefik.http.services.openclaw-deploy.loadbalancer.server.port=3000"
