name: landing-build

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - 'Dockerfile.landing'
      - '.github/workflows/landing-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/landing/**'

jobs:
  build:
    name: next build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Install
        working-directory: apps/landing
        run: pnpm install --no-frozen-lockfile

      - name: Build
        working-directory: apps/landing
        run: pnpm build
